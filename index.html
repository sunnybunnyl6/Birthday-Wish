<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body { 
            margin: 0; 
            /* Vibrant Birthday Ombre */
            background: linear-gradient(180deg, #667eea 0%, #764ba2 50%, #f093fb 100%) no-repeat;
            background-size: cover;
            height: 100vh;
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
        }
        
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            pointer-events: none; 
            background: transparent;
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 5em;
            font-weight: bold;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 0 0 40px #ffd700;
            z-index: 10;
            visibility: hidden;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 20px;
            height: 20px;
            opacity: 0;
            transition: opacity 3s ease-in-out, top 8s linear; 
            pointer-events: none;
            border-radius: 2px;
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 100; color: white; flex-direction: column;
        }
        
        button {
            padding: 20px 40px; font-size: 1.5rem; cursor: pointer;
            background: #ffd700; border: none; color: #333; border-radius: 50px;
            box-shadow: 0 0 20px #ffd700; font-weight: bold; transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ffd700;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>🎉 A Special Birthday Surprise! 🎂</h1>
        <button onclick="startShow()">Click to Celebrate! 🎈</button>
    </div>

    <audio id="bgMusic" src="birthday-music.mp3" loop></audio>

    <div id="message">Happy Birthday!</div>
    <canvas id="fireworksCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
